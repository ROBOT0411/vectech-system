<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vectech 設備試做管理系統</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>

    <!-- 步驟 1：擴充 Firebase 功能匯入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        // 新增匯入 getDocs, deleteDoc, doc, query, orderBy
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDF60MPyZUaGHzP3k4bb4NLvdZ0yxbV0Cc",
            authDomain: "vectech-v2-d7e70.firebaseapp.com",
            databaseURL: "https://vectech-v2-d7e70-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vectech-v2-d7e70",
            storageBucket: "vectech-v2-d7e70.firebasestorage.app",
            messagingSenderId: "122334953792",
            appId: "1:122334953792:web:29b213c3fb50a25473faa5",
            measurementId: "G-BYFXC882NV"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        // 將新功能綁定到 window.fs 供 React 使用
        window.fs = { collection, addDoc, signInAnonymously, getDocs, deleteDoc, doc, query, orderBy };
        window.firebaseReady = true;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .professional-input { width: 100%; padding: 1rem; background: white; border: 2px solid #e2e8f0; border-radius: 1rem; outline: none; transition: all 0.3s; }
        .professional-input:focus { border-color: #3b82f6; box-shadow: 0 4px 15px rgba(59,130,246,0.15); }
        
        /* 自訂卷軸樣式讓表格更好看 */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;

        // --- 填寫表單元件 (原本的內容) ---
        const SubmitForm = ({ setStatusMsg, statusMsg }) => {
            const [formData, setFormData] = useState({ equipmentModel: "", batchNumber: "", testData: "", anomaly: "" });

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatusMsg("資料上傳中...");
                try {
                    await window.fs.addDoc(window.fs.collection(window.db, "vectech_cases"), {
                        ...formData,
                        createdAt: new Date().toISOString()
                    });
                    setStatusMsg("✅ 資料已成功上傳至雲端！");
                    setFormData({ equipmentModel: "", batchNumber: "", testData: "", anomaly: "" });
                    setTimeout(() => setStatusMsg(""), 3000);
                } catch (error) {
                    console.error("寫入錯誤:", error);
                    setStatusMsg("❌ 上傳失敗，請確認資料庫是否已開啟「測試模式」。");
                }
            };

            return (
                <div className="bg-white p-8 rounded-3xl shadow-xl max-w-2xl mx-auto">
                    <div className="flex items-center gap-3 mb-6">
                        <i className="ph ph-clipboard-text text-3xl text-blue-600"></i>
                        <h2 className="text-2xl font-black">設備試做回報</h2>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div>
                            <label className="block text-sm font-bold text-slate-500 mb-2">設備型號</label>
                            <input required type="text" name="equipmentModel" value={formData.equipmentModel} onChange={handleChange} className="professional-input" placeholder="例如：VC-2000" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-slate-500 mb-2">試做批號</label>
                            <input required type="text" name="batchNumber" value={formData.batchNumber} onChange={handleChange} className="professional-input" placeholder="例如：B-240501" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-slate-500 mb-2">測試數據結果</label>
                            <textarea required name="testData" value={formData.testData} onChange={handleChange} className="professional-input h-24" placeholder="請填寫本次試做的關鍵測試數據..."></textarea>
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-slate-500 mb-2">異常狀況紀錄</label>
                            <textarea name="anomaly" value={formData.anomaly} onChange={handleChange} className="professional-input h-24" placeholder="若無異常可留白"></textarea>
                        </div>
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors">
                            提交回報至雲端
                        </button>
                    </form>
                </div>
            );
        };

        // --- 步驟 3：管理介面元件 (Admin Dashboard) ---
        const AdminDashboard = ({ setStatusMsg }) => {
            const [cases, setCases] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

            // 讀取資料
            const fetchCases = async () => {
                setIsLoading(true);
                try {
                    // 依照建立時間排序 (最新的在前面)
                    const q = window.fs.query(window.fs.collection(window.db, "vectech_cases"), window.fs.orderBy("createdAt", "desc"));
                    const querySnapshot = await window.fs.getDocs(q);
                    const data = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCases(data);
                } catch (error) {
                    console.error("讀取錯誤:", error);
                    setStatusMsg("❌ 讀取資料失敗");
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchCases();
            }, []);

            // 處理單筆選取/取消選取
            const toggleSelection = (id) => {
                setSelectedIds(prev => 
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            // 處理全選/全取消
            const toggleAll = () => {
                if (selectedIds.length === cases.length) {
                    setSelectedIds([]); // 全部取消
                } else {
                    setSelectedIds(cases.map(c => c.id)); // 全選
                }
            };

            // 執行刪除 (單筆)
            const executeSingleDelete = async (id) => {
                setStatusMsg("刪除中...");
                try {
                    await window.fs.deleteDoc(window.fs.doc(window.db, "vectech_cases", id));
                    setStatusMsg("✅ 刪除成功");
                    setSelectedIds(prev => prev.filter(item => item !== id)); // 從選取清單移除
                    fetchCases(); // 重新讀取資料
                } catch (error) {
                    console.error("刪除錯誤:", error);
                    setStatusMsg("❌ 刪除失敗");
                }
                setTimeout(() => setStatusMsg(""), 3000);
            };

            // 執行刪除 (批次)
            const executeBatchDelete = async () => {
                setStatusMsg("批次刪除中...");
                try {
                    // 使用 Promise.all 同時刪除多筆資料
                    const deletePromises = selectedIds.map(id => 
                        window.fs.deleteDoc(window.fs.doc(window.db, "vectech_cases", id))
                    );
                    await Promise.all(deletePromises);
                    
                    setStatusMsg(`✅ 成功刪除 ${selectedIds.length} 筆資料`);
                    setSelectedIds([]); // 清空選取清單
                    fetchCases(); // 重新讀取資料
                } catch (error) {
                    console.error("批次刪除錯誤:", error);
                    setStatusMsg("❌ 批次刪除失敗");
                }
                setTimeout(() => setStatusMsg(""), 3000);
            };

            // 觸發確認對話框
            const confirmDeleteSingle = (id) => {
                setConfirmDialog({
                    isOpen: true,
                    message: "確定要刪除這筆紀錄嗎？此動作無法復原。",
                    onConfirm: () => executeSingleDelete(id)
                });
            };

            const confirmBatchDelete = () => {
                if (selectedIds.length === 0) return;
                setConfirmDialog({
                    isOpen: true,
                    message: `確定要刪除選取的 ${selectedIds.length} 筆紀錄嗎？此動作無法復原。`,
                    onConfirm: () => executeBatchDelete()
                });
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl max-w-5xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div className="flex items-center gap-3">
                            <i className="ph ph-database text-3xl text-purple-600"></i>
                            <h2 className="text-2xl font-black">管理總覽</h2>
                        </div>
                        
                        {/* 批次操作按鈕區 */}
                        <div className="flex items-center gap-4 w-full md:w-auto">
                            <span className="text-sm text-slate-500 font-bold">已選取 {selectedIds.length} 筆</span>
                            <button 
                                onClick={confirmBatchDelete}
                                disabled={selectedIds.length === 0}
                                className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold transition-all ${selectedIds.length > 0 ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}
                            >
                                <i className="ph ph-trash"></i> 批次刪除
                            </button>
                            <button onClick={fetchCases} className="p-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition-all">
                                <i className="ph ph-arrows-clockwise text-xl"></i>
                            </button>
                        </div>
                    </div>

                    {/* 自訂確認刪除對話框 (Modal) */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-fade-in">
                                <div className="flex items-center gap-3 text-red-600 mb-4">
                                    <i className="ph ph-warning-circle text-3xl"></i>
                                    <h3 className="text-lg font-black">確認刪除</h3>
                                </div>
                                <p className="text-slate-600 mb-6 font-bold">{confirmDialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setConfirmDialog({isOpen: false})} className="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold transition-colors">取消</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({isOpen: false}); }} className="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold transition-colors">確定刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 資料表格 */}
                    <div className="overflow-x-auto custom-scrollbar border border-slate-200 rounded-2xl">
                        {isLoading ? (
                            <div className="p-12 text-center text-slate-500 font-bold flex flex-col items-center gap-2">
                                <i className="ph ph-spinner-gap animate-spin text-3xl"></i>
                                載入中...
                            </div>
                        ) : cases.length === 0 ? (
                            <div className="p-12 text-center text-slate-500 font-bold">
                                尚無任何試做紀錄
                            </div>
                        ) : (
                            <table className="w-full text-left border-collapse whitespace-nowrap">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                        <th className="p-4 w-12 text-center">
                                            <input 
                                                type="checkbox" 
                                                checked={selectedIds.length === cases.length && cases.length > 0}
                                                onChange={toggleAll}
                                                className="w-5 h-5 accent-blue-600 rounded cursor-pointer"
                                            />
                                        </th>
                                        <th className="p-4 font-bold">建立時間</th>
                                        <th className="p-4 font-bold">設備型號</th>
                                        <th className="p-4 font-bold">試做批號</th>
                                        <th className="p-4 font-bold">測試結果</th>
                                        <th className="p-4 font-bold">異常紀錄</th>
                                        <th className="p-4 font-bold text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {cases.map((item) => (
                                        <tr key={item.id} className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${selectedIds.includes(item.id) ? 'bg-blue-50/50' : ''}`}>
                                            <td className="p-4 text-center">
                                                <input 
                                                    type="checkbox" 
                                                    checked={selectedIds.includes(item.id)}
                                                    onChange={() => toggleSelection(item.id)}
                                                    className="w-5 h-5 accent-blue-600 rounded cursor-pointer"
                                                />
                                            </td>
                                            <td className="p-4 text-sm text-slate-500">
                                                {new Date(item.createdAt).toLocaleString()}
                                            </td>
                                            <td className="p-4 font-bold text-slate-800">{item.equipmentModel}</td>
                                            <td className="p-4 font-bold text-slate-800">{item.batchNumber}</td>
                                            <td className="p-4 text-slate-600 max-w-[200px] truncate" title={item.testData}>{item.testData}</td>
                                            <td className="p-4 text-slate-600 max-w-[200px] truncate" title={item.anomaly}>{item.anomaly || '-'}</td>
                                            <td className="p-4 text-center">
                                                <button 
                                                    onClick={() => confirmDeleteSingle(item.id)}
                                                    className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                    title="刪除此筆資料"
                                                >
                                                    <i className="ph ph-trash text-xl"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        };

        // --- 主要應用程式 (負責切換頁面) ---
        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [statusMsg, setStatusMsg] = useState("正在連線至雲端...");
            // 步驟 2：新增頁面狀態，預設為 'form'
            const [currentView, setCurrentView] = useState('form'); 

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.firebaseReady) {
                        clearInterval(checkFirebase);
                        window.fs.signInAnonymously(window.auth)
                            .then(() => { setIsReady(true); setStatusMsg(""); })
                            .catch(err => setStatusMsg("連線失敗，請檢查金鑰或網路：" + err.message));
                    }
                }, 500);
            }, []);

            if (!isReady) {
                return <div className="min-h-screen flex items-center justify-center font-bold text-xl">{statusMsg}</div>;
            }

            return (
                <div className="min-h-screen pb-12">
                    {/* 頂部導覽列 */}
                    <nav className="bg-white shadow-sm mb-8 px-6 py-4">
                        <div className="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="font-black text-xl text-blue-900 tracking-wider">
                                VECTECH <span className="text-blue-500">SYSTEM</span>
                            </div>
                            
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                <button 
                                    onClick={() => setCurrentView('form')}
                                    className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${currentView === 'form' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    回報表單
                                </button>
                                <button 
                                    onClick={() => setCurrentView('admin')}
                                    className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${currentView === 'admin' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    管理總覽
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* 共用狀態訊息顯示 */}
                    {statusMsg && (
                        <div className="max-w-md mx-auto mb-6 px-4">
                            <div className={`p-4 rounded-xl font-bold text-center shadow-sm ${statusMsg.includes('✅') ? 'bg-green-100 text-green-700' : statusMsg.includes('❌') ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>
                                {statusMsg}
                            </div>
                        </div>
                    )}

                    {/* 根據狀態切換顯示的元件 */}
                    <div className="px-4">
                        {currentView === 'form' ? (
                            <SubmitForm setStatusMsg={setStatusMsg} statusMsg={statusMsg} />
                        ) : (
                            <AdminDashboard setStatusMsg={setStatusMsg} />
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
